<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>검도 연무 시뮬레이터</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1c1c1a;
    font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 480px;
    background: #262624;
    border: 1px solid #3a3a37;
    border-radius: 16px;
    padding: 40px 32px;
  }
  h1 {
    color: #f0efe8;
    font-size: 22px;
    font-weight: 500;
    text-align: center;
    margin: 0 0 8px;
  }
  p.sub {
    color: #a8a69c;
    font-size: 14px;
    text-align: center;
    margin: 0 0 32px;
  }
  a.btn {
    display: flex;
    align-items: center;
    gap: 16px;
    text-decoration: none;
    background: #33332f;
    border: 1px solid #46453f;
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 12px;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
  }
  a.btn:hover {
    background: #3c3c37;
    border-color: #6a6960;
    transform: translateY(-1px);
  }
  a.btn:last-child { margin-bottom: 0; }
  .badge {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #6b1f1f;
    color: #f0dcdc;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-text { flex: 1; min-width: 0; }
  .btn-title {
    color: #f0efe8;
    font-size: 15px;
    font-weight: 500;
    display: block;
    margin-bottom: 3px;
    line-height: 1.4;
  }
  .btn-sub {
    color: #8f8d82;
    font-size: 12px;
    display: block;
    line-height: 1.4;
  }
  .chevron {
    flex-shrink: 0;
    color: #6a6960;
    font-size: 18px;
  }
  a.btn.disabled {
    opacity: 0.5;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>게임플레이 아이데이션 시뮬레이터</h1>
    <p class="sub">항목을 선택하세요</p>

    <a class="btn" href="https://playtest-ac1.pages.dev/quiz-survival_v1" target="_blank" rel="noopener">
      <span class="badge">1</span>
      <span class="btn-text">
        <span class="btn-title">OX 퀴즈 시뮬레이터</span>
        <span class="btn-sub">v1 </span>
      </span>
      <span class="chevron">›</span>
    </a>
    
    
  </div>
</body>
</html>
